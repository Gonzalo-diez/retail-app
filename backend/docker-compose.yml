services:

  db:
    image: postgres:16
    container_name: kiosko_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kiosko_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: kiosko_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: kiosko_api
    restart: always
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:LuckyStrike1984@db:5432/kiosko
      REDIS_URL: redis://redis:6379/0

  worker:
    build: .
    container_name: kiosko_worker
    restart: always
    command: rq worker --url redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:LuckyStrike1984@db:5432/kiosko
      REDIS_URL: redis://redis:6379/0

volumes:
  postgres_data:
  redis_data:
